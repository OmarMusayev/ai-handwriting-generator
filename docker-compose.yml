version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./disk:/disk
      - .:/app
    environment:
      - DISK_STORAGE_PATH=/disk
      - MODEL_PATH=/app/results/synthesis/best_model_synthesis_4.pt
      - DATA_PATH=/app/data/
      - MAX_GEN_STEPS=600
      - SESSION_TTL_DAYS=7
      - MAX_STYLES_PER_SESSION=10
      - N_SAMPLES=5
    restart: unless-stopped
