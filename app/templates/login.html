{% extends "base.html" %}

{% block content %}

<!-- Inline styles specifically for this login page -->
<style>
    /* Modern gradient text style */
    .gradient-text {
        font-family: 'Poppins', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(90deg, #00C9FF 0%, #92FE9D 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.5rem;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8f9fa; /* Light background */
    }

    .login-card {
        border: 0;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .btn-login {
        background: #2472f0;
        color: #fff;
        border-radius: 25px;
        font-weight: 600;
        transition: background 0.3s ease-in-out;
    }
    .btn-login:hover {
        background: #1d5bcc;
        color: #fff;
    }

    .contact-info p {
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
    }

    .contact-info a {
        color: #2472f0;
        text-decoration: none;
    }
    .contact-info a:hover {
        text-decoration: underline;
    }
</style>

<!-- Main login container -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card login-card col-md-6 p-4">
        <!-- Modern, cool heading -->
        <h1 class="gradient-text text-center">
            Handwriting Generator<br>
            brought to you by Omar AI
        </h1>
        
        <!-- Login Form -->
        <!-- Use method="POST" and action="/login" if hooking it to actual backend logic -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="emailInput">Email address</label>
                <input
                    type="email"
                    class="form-control"
                    id="emailInput"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>
            <div class="form-group">
                <label for="passwordInput">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="passwordInput"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>
            <button type="submit" class="btn btn-login btn-block mb-3">Login</button>
        </form>

        <!-- Optionally, you can add links for forgot password / sign up -->
        <div class="text-center mb-4">
            <a href="#" style="color: #2472f0;">Forgot Password?</a> | 
            <a href="/signup" style="color: #2472f0;">Sign Up</a>
        </div>

        <!-- Contact Info -->
        <div class="contact-info text-center">
            <p>Contact Omar:</p>
            <p>
                <strong>Email:</strong>
                <a href="mailto:omar.musayev.v.2@gmail.com">omar.musayev.v.2@gmail.com</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
