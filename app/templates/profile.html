{% extends "base.html" %}
{% block content %}
<div class="container my-4">
  <h3>My Profile</h3>
  
  {% if samples|length == 0 %}
    <p>You have no saved samples yet.</p>
  {% else %}
    <div class="row">
      {% for s in samples %}
      <div class="col-md-6 mb-4">
        <div class="card shadow">
          <img
            src="{{ s.image_path }}"
            alt="Saved sample"
            class="card-img-top"
            style="object-fit: contain; width: 100%; height: 200px;"
          >
          <div class="card-body">
            <p class="card-text">Created at: {{ s.created_at }}</p>

            <button 
              class="btn btn-info btn-sm"
              onclick="downloadBase64('{{ s.image_path }}')"
            >
              Download to Device
            </button>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  {% endif %}
</div>

<!-- Tiny JavaScript to download a base64 image locally -->
<script>
function downloadBase64(base64Image) {
  // Creates a temporary anchor link that triggers a file download
  const a = document.createElement('a');
  a.href = base64Image;            // e.g. "data:image/png;base64,..."
  a.download = 'handwriting.png';  // The default file name for the download
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
{% endblock %}
