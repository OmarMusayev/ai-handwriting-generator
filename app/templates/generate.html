{% extends "base.html" %}
{% block content %}

<!-- Load Open Iconic so <span class="oi oi-microphone"> appears -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/open-iconic/1.1.1/font/css/open-iconic-bootstrap.min.css"
  integrity="sha512-8SVX7zZXvOWG0a5Pq4IsgjPLrwX+wcRzN8iHZm94roVTlAqF6TLRmdOPcytNT8KSx1TrWBWf0/GexGyJ3syD/w=="
  crossorigin="anonymous"
/>

<div class="container my-5" style="max-width: 800px;">
    <h3 class="mb-4 text-primary">Generate Handwriting</h3>
    
    <div class="card shadow mb-4">
        <div class="card-body">
            <form action="/generate" method="post" onsubmit="loading()">
                
                <!-- Row for text input + mic + generate button -->
                <div class="form-row">
                    <!-- Col for text input + mic -->
                    <div class="col-md-8 mb-3">
                        <label for="text" class="sr-only">Text to Generate</label>
                        <div class="input-group">
                            <input
                                id="text"
                                type="text"
                                name="text"
                                class="form-control"
                                style="min-width: 300px;"  
                                placeholder="Write some text..."
                                onkeypress="onenter()"
                            >
                            <div class="input-group-append">
                                <!-- Microphone button with an icon -->
                                <button
                                    type="button"
                                    class="btn btn-info"
                                    id="micBtn"
                                    onclick="toggleRecognition()"
                                    title="Click to start/stop speech recognition"
                                >
                                    <img
                                        src="/static/uploads/—Pngtree—vector microphone icon_4013504.png"  
                                        alt="Mic"
                                        style="width: 20px; height: 20px;"
                                    >
                                </button>
                            </div>
                        </div>
                        
                        <!-- Red warning below the input group -->
                        <small class="text-danger">
                            (Speech-to-text feature only works on Chrome for now)
                        </small>
                    </div>
                    
                    <!-- Col for the "Generate" button -->
                    <div class="col-auto mb-2">
                        <button
                            id="gen_button"
                            class="btn btn-primary"
                            type="submit"
                            name="gen-writing"
                        >
                            Generate
                        </button>
                    </div>
                </div>

                <!-- Style selection row -->
                <div class="form-row mb-3">
                    <div class="col-12">
                        <label class="mr-3 font-weight-bold">Style:</label>
                        <div class="form-check form-check-inline">
                            <input
                                class="form-check-input"
                                type="radio"
                                name="styleOptions"
                                id="radio1"
                                value="defaultStyle"
                                checked
                            >
                            <label class="form-check-label" for="radio1">Default Style</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input
                                class="form-check-input"
                                type="radio"
                                name="styleOptions"
                                id="radio2"
                                value="yourStyle"
                            >
                            <label class="form-check-label" for="radio2">Your Style</label>
                        </div>
                    </div>
                </div>

                <!-- Bias slider row -->
                <div class="form-row align-items-center">
                    <label for="bias_range" class="mr-2 font-weight-bold">Bias:</label>
                    <span id="bias" class="mr-3 font-weight-bold">8</span>
                    <div class="col-sm-6 col-md-4">
                        <input
                            type="range"
                            name="bias"
                            class="custom-range border-0"
                            min="0"
                            max="10"
                            step="0.5"
                            value="8"
                            id="bias_range"
                        >
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Original style card -->
    <div class="card shadow mb-4">
        <div class="card-header">Original Style</div>
        <div class="card-body d-flex justify-content-center">
            <div class="thumbnail" style="border: 1px solid #1cbbc0; border-radius: 5px; width: 60%; height: 100px;">
                <img
                    src="{{ org_src }}"
                    class="card-img-top"
                    style="object-fit: contain; width: 100%; height: 100%;"
                >
            </div>
        </div>
    </div>

    <!-- Generated samples card -->
    <div class="card shadow mb-4">
        <div class="card-header">
            Text: "{{ text }}" &bull; Bias: {{ bias }}
        </div>
        <div class="card-body d-flex flex-column align-items-center">
            {% for sample in samples %}
            <div
              class="thumbnail mb-3"
              style="border: 1px solid #1cbbc0; border-radius: 5px; width: 60%; height: 100px;"
            >
                <!-- The base64 image -->
                <img
                    src="{{ sample }}"
                    alt="Generated handwriting sample"
                    style="object-fit: contain; width: 100%; height: 100%;"
                >
            </div>

            <!-- "Save to Profile" button/form (server-side) -->
            <form action="/save_sample" method="POST" class="mb-2">
                <input type="hidden" name="image_data" value="{{ sample }}">
                <button type="submit" class="btn btn-success btn-sm">Save to Profile</button>
            </form>

            <!-- "Download Locally" button (base64 -> user device) -->
            <button 
              class="btn btn-info btn-sm mb-4"
              onclick="downloadBase64('{{ sample }}')"
            >
              Download to Device
            </button>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Custom JavaScript for this page -->
<script type="text/javascript">
    function onenter() {
        const inp = document.getElementById('text');
        if (window.event && window.event.keyCode === 13) {
            inp.blur();
        }
    }

    function loading() {
        $('#gen_button').html(
            '<span class="spinner-border spinner-border-sm mr-2" role="status" aria-hidden="true"></span>Generating...'
        ).addClass('disabled');
    }

    // Update 'Bias' label
    const slider = document.getElementById("bias_range");
    const output = document.getElementById("bias");
    slider.oninput = function () {
        output.innerHTML = this.value;
    };

    // -------------------------------------------------
    //  WEB SPEECH API FOR BROWSER-BASED RECOGNITION
    // -------------------------------------------------
    let recognition;
    let isRecording = false;

    function getSpeechRecognition() {
        if ('SpeechRecognition' in window) {
            return new SpeechRecognition();
        } else if ('webkitSpeechRecognition' in window) {
            return new webkitSpeechRecognition();
        }
        return null;
    }

    function toggleRecognition() {
        if (!recognition) {
            recognition = getSpeechRecognition();
            if (!recognition) {
                alert('Web Speech API not supported in this browser.');
                return;
            }

            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                let transcript = event.results[0][0].transcript;
                console.log('Recognized text:', transcript);
                document.getElementById('text').value = transcript;
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event);
            };

            recognition.onend = function() {
                console.log('Speech recognition ended');
                isRecording = false;
                document.getElementById('micBtn').classList.remove('btn-danger');
                document.getElementById('micBtn').classList.add('btn-secondary');
            };
        }

        if (!isRecording) {
            recognition.start();
            isRecording = true;
            document.getElementById('micBtn').classList.remove('btn-secondary');
            document.getElementById('micBtn').classList.add('btn-danger');
        } else {
            recognition.stop();
        }
    }

    // -----------------------------------
    // SIMPLE BASE64 DOWNLOAD FUNCTION
    // -----------------------------------
    function downloadBase64(base64Image) {
        // Create a temporary anchor element
        const a = document.createElement('a');
        a.href = base64Image;               // data URI (e.g. "data:image/png;base64,AAA...")
        a.download = 'handwriting.png';     // default file name
        document.body.appendChild(a);
        a.click();                          // trigger the download
        document.body.removeChild(a);
    }
</script>
{% endblock %}
