{% extends "base.html" %}
{% block content %}
<div class="container my-4">
    <!-- Input form for handwriting text -->
    <form name="form" onsubmit="return false;">
        <div class="form-group">
            <input 
                id="text1"
                type="text"
                class="form-control"
                name="text"
                placeholder="Write some text..."
                onkeypress="return onenter()"
            >
            <p id="message" class="text-danger mt-1"></p>
        </div>
    </form>

    <!-- Drawing canvas area -->
    <div class="card shadow mb-3" style="height: 180px;">
        <div class="card-body p-0">
            <svg
                id="svg1"
                baseProfile="full"
                version="1.1"
                style="width:100%; height:100%;"
                xmlns="http://www.w3.org/2000/svg"
                xmlns:ev="http://www.w3.org/2001/xml-events"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                onmousedown="mouseDown(evt)"
                onmouseup="mouseUp(evt)"
                onmousemove="mouseMove(evt)"
                ontouchstart="mouseDown(evt)"
                ontouchmove="mouseMove(evt)"
                ontouchend="mouseUp(evt)"
            >
                <script type="text/JavaScript">
                    <![CDATA[
                        var svg = document.getElementById("svg1");
                        var pt = svg.createSVGPoint();
                        var isDrawing = false;

                        function alert_coords(evt) {
                            // If it's a touch event, use targetTouches
                            if(evt.targetTouches) {
                                pt.x = evt.targetTouches[0].clientX;
                                pt.y = evt.targetTouches[0].clientY;
                            } else {
                                pt.x = evt.clientX;
                                pt.y = evt.clientY;
                            }
                            // Convert client coords to SVG coords
                            return pt.matrixTransform(svg.getScreenCTM().inverse());
                        }

                        function mouseDown(evt) {
                            evt.preventDefault();
                            let point = alert_coords(evt);
                            isDrawing = true;
                            let path = document.getElementById("path1");
                            let d = path.getAttributeNS(null, "d") + "M" + point.x + "," + point.y + " ";
                            path.setAttributeNS(null, "d", d);
                        }

                        function mouseUp(evt) {
                            evt.preventDefault();
                            if (isDrawing === true) {
                                let point = alert_coords(evt);
                                let path = document.getElementById("path1");
                                let d = path.getAttributeNS(null, "d") + "M" + point.x + "," + point.y + " ";
                                path.setAttributeNS(null, "d", d);
                                isDrawing = false;
                            }
                        }

                        function mouseMove(evt) {
                            evt.preventDefault();
                            if (isDrawing === true) {
                                let point = alert_coords(evt);
                                let path = document.getElementById("path1");
                                let x = point.x;
                                let y = point.y ;
                                let d = path.getAttributeNS(null, "d") + "L" + x + "," + y + " ";
                                path.setAttributeNS(null, "d", d);
                            }
                        }
                    ]]>
                </script>
                <path id="path1" d="" fill="none" stroke="blue" stroke-width="1" />
            </svg>
        </div>
    </div>

    <div class="btn-group" style="padding-top: 10px;">
        <button
            id="save_button"
            class="btn btn-primary"
            name="save-writing"
            onclick="downloadSvg()"
        >
            Save style
        </button>
        <button
            class="btn btn-secondary"
            name="clear"
            onclick="clearSvg()"
        >
            Clear Canvas
        </button>
    </div>
</div>

<script type="text/javascript">
    // Triggered on 'Enter' key press in text1
    function onenter() {
        const text = document.getElementById('text1').value;
        if (window.event && window.event.keyCode === 13) {
            document.getElementById('text1').blur();
            if (text === "") {
                document.getElementById("message").innerHTML = "Please enter some text.";
            }
        } else {
            document.getElementById("message").innerHTML = "";
        }
    }

    // Clear the SVG path
    function clearSvg() {
        const svg = document.getElementById("svg1");
        svg.getElementById('path1').setAttributeNS(null, 'd', "");
    }

    // Called when Save style is clicked
    function downloadSvg() {
        const svg = document.getElementById("svg1");
        const path = svg.getElementById('path1').getAttributeNS(null, 'd');
        const text = document.getElementById("text1").value;

        if (text === "") {
            document.getElementById("message").innerHTML = "Please enter some text.";
            return;
        }

        // Use jQuery Ajax (now that jQuery is loaded from base.html)
        $.ajax({
            type: "POST",
            url: "/upload_style",
            contentType: "application/json",
            data: JSON.stringify({"path": path, "text": text}),
            dataType: "json",
            success: function(response) {
                if (response.message === '') {
                    window.location.href = response.redirect;
                } else {
                    document.getElementById("message").innerHTML = response.message;
                }
                console.log(response);
            },
            error: function(err) {
                console.log(err);
            }
        });
    }
</script>
{% endblock %}
