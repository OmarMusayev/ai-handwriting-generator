<!DOCTYPE html>
<html lang="en" data-theme="minimal">
<head>
<script>
  (function(){
    var t = localStorage.getItem('hm-theme');
    if (t === 'minimal' || t === 'synth') {
      document.documentElement.setAttribute('data-theme', t);
    }
  })();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <span class="logo">✦ HAND MAGIC ✦</span>
    <span class="credit">Made by Omar Musayev</span>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" aria-label="Toggle theme">[ MINIMAL ]</button>
  </header>

  <!-- Studio -->
  <div class="studio">

    <!-- Style list panel -->
    <div class="card">
      <div class="card-title">STYLE LAB</div>
      <div id="style-list" class="style-list">
        <p class="no-styles">No styles yet.<br>Draw &amp; save one!</p>
      </div>
    </div>

    <!-- Canvas panel -->
    <div class="card" id="canvas-panel">
      <div class="card-title">DRAW YOUR STYLE</div>
      <p class="hint">Write a few words — the model learns your stroke style.</p>
      <input type="text" id="priming-text" placeholder="e.g. hello world" class="text-input" style="margin-bottom:0.7rem;">
      <canvas id="draw-canvas" width="800" height="160"></canvas>
      <div class="row-btns">
        <button class="btn" id="btn-clear">[ CLEAR ]</button>
        <button class="btn btn-cyan" id="btn-save">[ SAVE STYLE ]</button>
      </div>
    </div>

  </div>

  <!-- Generate -->
  <section>
    <div class="card">
      <div class="card-title">GENERATE</div>

      <form id="generate-form">
        <input type="text" id="gen-text" class="text-input" placeholder="Enter text to synthesize..." style="margin-bottom:0.8rem;">

        <div class="hint" style="margin-bottom:0.4rem;">STYLE</div>
        <div class="style-pills" id="style-pills"></div>

        <div class="bias-row">
          <label>BIAS</label>
          <input type="range" id="bias-slider" min="0" max="10" step="0.5" value="5">
          <span id="bias-display">5.0</span>
        </div>

        <button type="submit" class="btn btn-cyan" id="btn-synthesize" style="min-width:180px;">[ ▶ SYNTHESIZE ]</button>
      </form>

      <div class="progress-wrap" id="gen-progress-bar" style="display:none;">
        <div class="progress-fill" id="gen-progress-fill"></div>
        <span class="progress-label" id="gen-progress-label">0 / 5 samples</span>
      </div>

      <div class="results-grid" id="results-grid"></div>
    </div>
  </section>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="Generated handwriting">
</div>

<!-- Theme wipe overlay -->
<div id="theme-wipe"></div>

<script src="/static/js/studio.js"></script>
<script src="/static/js/generate.js"></script>
<script>
(function () {
  var btn = document.getElementById('btn-theme');
  var wipe = document.getElementById('theme-wipe');
  var busy = false;

  function updateBtn(theme) {
    btn.textContent = theme === 'synth' ? '[ MINIMAL ]' : '[ \u2726 SYNTH ]';
  }

  updateBtn(document.documentElement.getAttribute('data-theme') || 'synth');

  window.toggleTheme = function () {
    var current = document.documentElement.getAttribute('data-theme') || 'minimal';
    var next = current === 'synth' ? 'minimal' : 'synth';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('hm-theme', next);
    updateBtn(next);
    if (window.studioRedrawCanvas) window.studioRedrawCanvas();
  };
})();
</script>
</body>
</html>
